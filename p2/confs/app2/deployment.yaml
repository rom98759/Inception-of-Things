apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
        - name: app2
          image: hashicorp/http-echo:latest
          args: ["-text=Hello from App2 pod: $(POD_ENV)"]
          ports:
            - containerPort: 5678
          env:
            - name: POD_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name