apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1
          image: hashicorp/http-echo:latest
          args: ["-text=Hello from App1 pod: $(POD_ENV)"]
          ports:
            - containerPort: 5678
          env:
            - name: POD_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name